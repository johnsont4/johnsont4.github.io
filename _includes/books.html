<section class="books-section">
  <h2>Recent Books I've Loved</h2>
  <ul class="books-list">
    {% for book in site.data.books %}
    <li class="book-item">
      <span class="book-title">
        {% if book.link and book.link != "" %}
          <a href="{{ book.link }}"><em>{{ book.title }}</em></a>
        {% else %}
          <em>{{ book.title }}</em>
        {% endif %}
      </span>
      <span class="book-author"> by {{ book.author }}</span>
      {% if book.note and book.note != "" %}
        <span class="book-note"> — {{ book.note }}</span>
      {% endif %}
    </li>
    {% endfor %}
  </ul>
</section>
