<section class="news-section">
  <h2>News</h2>
  {% for item in site.data.news %}
  <div class="news-row">
    <span class="news-date"><strong>{{ item.date }}</strong></span>
    <span class="news-text">{{ item.text | markdownify | remove: '<p>' | remove: '</p>' }}</span>
  </div>
  {% endfor %}
</section>
