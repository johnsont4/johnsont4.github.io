<section class="news-section">
  <h2>News</h2>
  <table class="news-table">
    {% for item in site.data.news %}
    <tr>
      <td class="news-date"><strong>{{ item.date }}</strong></td>
      <td class="news-text">{{ item.text | markdownify }}</td>
    </tr>
    {% endfor %}
  </table>
</section>
